<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>算术训练优化版</title>
  <style>
    :root {
      --primary-color: #2c3e50;
      --accent-color: #e74c3c;
      --btn-bg: #3498db;
      --btn-hover: #2980b9;
      --correct-bg: #2ecc71;
      --wrong-bg: #e74c3c;
      --input-border: #bdc3c7;
      --card-bg: #ffffff;
    }

    body {
      margin: 0;
      padding: 2rem;
      background: #f8f9fa;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      padding: 2rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .title {
      color: var(--primary-color);
      font-size: 2.2rem;
      margin-bottom: 1rem;
    }

    .timer {
      font-size: 1.8rem;
      color: #7f8c8d;
      display: flex;
      justify-content: center;
      gap: 0.5rem;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .btn {
      padding: 0.8rem 2rem;
      border: none;
      border-radius: 8px;
      background: var(--btn-bg);
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover {
      background: var(--btn-hover);
      transform: translateY(-2px);
    }

    .question-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
      padding: 1rem;
    }

    .question-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem;
      background: #f8f9fa;
      border-radius: 8px;
      transition: transform 0.2s;
    }

    .question-item:hover {
      transform: translateY(-3px);
    }

    .number {
      font-size: 1.3rem;
      color: var(--primary-color);
      min-width: 30px;
      text-align: center;
    }

    .operator {
      color: var(--accent-color);
      font-weight: 700;
      font-size: 1.4rem;
    }

    .answer-input {
      width: 70px;
      height: 40px;
      border: 2px solid var(--input-border);
      border-radius: 6px;
      text-align: center;
      font-size: 1.2rem;
      transition: all 0.2s;
    }

    .answer-input:focus {
      border-color: var(--btn-bg);
      box-shadow: 0 0 8px rgba(52, 152, 219, 0.3);
      outline: none;
    }

    .correct {
      background: var(--correct-bg) !important;
      color: white !important;
      border-color: transparent !important;
    }

    .wrong {
      background: var(--wrong-bg) !important;
      color: white !important;
      border-color: transparent !important;
    }

    /* 新增焦点样式 */
    .answer-input:focus {
      transform: scale(1.05);
      box-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
    }

    /* 当前焦点标识 */
    .current-focus {
      border-color: #e74c3c !important;
      background: #fff9f9;
    }

    @media (max-width: 992px) {
      .question-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 576px) {
      .container {
        padding: 1rem;
      }

      .question-grid {
        grid-template-columns: 1fr;
      }

      .question-item {
        justify-content: center;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="title">速算训练营</h1>
      <div class="timer">
        <span id="minutes">00</span>:<span id="seconds">00</span>
      </div>
    </header>

    <div class="controls">
      <button class="btn" id="checkBtn">提交答案</button>
      <button class="btn" id="newBtn">新题生成</button>
    </div>

    <div class="question-grid" id="grid"></div>
  </div>

  <script>
    const grid = document.getElementById('grid');
    const checkBtn = document.getElementById('checkBtn');
    const newBtn = document.getElementById('newBtn');
    const minutes = document.getElementById('minutes');
    const seconds = document.getElementById('seconds');
    let inputsArray = [];
    let currentIndex = 0;
    let timer = null;
    let time = 0;

    // 初始化输入框数组
    function initInputsArray() {
      inputsArray = Array.from(document.querySelectorAll('.answer-input'));
      inputsArray.forEach((input, index) => input.dataset.index = index);
    }

    // 键盘导航
    function handleKeyNavigation(e) {
      if (document.activeElement.classList.contains('answer-input')) {
        currentIndex = parseInt(document.activeElement.dataset.index);

        switch (e.key) {
          case 'ArrowRight':
          case 'ArrowDown':
          case 'Enter':
            e.preventDefault();
            navigate(1);
            break;
          case 'ArrowLeft':
          case 'ArrowUp':
            e.preventDefault();
            navigate(-1);
            break;
        }
      }
    }

    // 导航逻辑
    function navigate(direction) {
      currentIndex += direction;
      if (currentIndex >= inputsArray.length) currentIndex = 0;
      if (currentIndex < 0) currentIndex = inputsArray.length - 1;
      const target = inputsArray[currentIndex];
      target.focus();
      target.classList.add('current-focus');
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // 生成题目
    function generateQuestions() {
      grid.innerHTML = '';
      for (let i = 0; i < 5; i++) {
        for (let j = 0; j < 4; j++) {
          let num1 = Math.floor(Math.random() * 20) + 1;
          let num2 = Math.floor(Math.random() * 20) + 1;
          const operator = Math.random();
          let operatorSymbol;
          let correctAnswer;

          if (operator < 0.25) {
            operatorSymbol = '+';
            correctAnswer = num1 + num2;
          } else if (operator < 0.5) {
            operatorSymbol = '-';
            correctAnswer = num1 - num2;
          } else if (operator < 0.75) {
            operatorSymbol = '×';
            correctAnswer = num1 * num2;
          } else {
            operatorSymbol = '÷';
            // 确保除数不为0
            while (num2 === 0) {
              num2 = Math.floor(Math.random() * 20) + 1; // 如果除数为0，重新生成
            }
            const dividend = num1 * num2; // 生成被除数
            correctAnswer = dividend / num2; // 结果为整数
            num1 = dividend; // 更新 num1 为被除数
          }

          const question = document.createElement('div');
          question.className = 'question-item';

          question.innerHTML = `
            <span class="number">${num1}</span>
            <span class="operator">${operatorSymbol}</span>
            <span class="number">${num2}</span>
            <span class="operator">=</span>
          `;

          const input = document.createElement('input');
          input.className = 'answer-input';
          input.type = 'number';
          input.placeholder = '?';
          question.appendChild(input);
          grid.appendChild(question);
        }
      }
      initInputsArray(); // 更新输入框数组
    }

    // 更新计时器
    function updateTimer() {
      time++;
      minutes.textContent = String(Math.floor(time / 60)).padStart(2, '0');
      seconds.textContent = String(time % 60).padStart(2, '0');
    }

    // 检查答案
    checkBtn.addEventListener('click', () => {
      let correctCount = 0;
      const inputs = document.querySelectorAll('.answer-input');
      inputs.forEach(input => {
        const numbers = input.parentElement.querySelectorAll('.number');
        const operator = input.parentElement.querySelector('.operator').textContent;
        const a = parseInt(numbers[0].textContent);
        const b = parseInt(numbers[1].textContent);
        let correct;

        if (operator === '+') correct = a + b;
        else if (operator === '-') correct = a - b;
        else if (operator === '×') correct = a * b;
        else if (operator === '÷') correct = a * b / b;

        if (parseInt(input.value) === correct) {
          correctCount++;
          input.classList.add('correct');
          input.classList.remove('wrong');
        } else {
          input.classList.add('wrong');
          input.classList.remove('correct');
        }
      });
      clearInterval(timer);
      alert(`正确率：${correctCount}/${inputs.length}\n用时：${minutes.textContent}分${seconds.textContent}秒`);
    });

    // 生成新题
    newBtn.addEventListener('click', () => {
      generateQuestions();
      time = 0;
      clearInterval(timer);
      timer = setInterval(updateTimer, 1000);
      document.querySelectorAll('.answer-input').forEach(input => {
        input.value = '';
        input.classList.remove('correct', 'wrong');
      });
    });

    // 添加键盘导航
    document.addEventListener('keydown', handleKeyNavigation);

    // 初始化
    generateQuestions();
    timer = setInterval(updateTimer, 1000);
  </script>
</body>
</html>
