<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>算术训练优化版</title>
  <style>
    :root {
      --primary-color: #2c3e50;
      --accent-color: #e74c3c;
      --btn-bg: #3498db;
      --btn-hover: #2980b9;
      --correct-bg: #2ecc71;
      --wrong-bg: #e74c3c;
      --input-border: #bdc3c7;
      --card-bg: #ffffff;
    }

    body {
      margin: 0;
      padding: 2rem;
      background: #f8f9fa;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      padding: 2rem;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .title {
      color: var(--primary-color);
      font-size: 2.2rem;
      margin-bottom: 1rem;
    }

    .timer {
      font-size: 1.8rem;
      color: #7f8c8d;
      display: flex;
      justify-content: center;
      gap: 0.5rem;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .btn {
      padding: 0.8rem 2rem;
      border: none;
      border-radius: 8px;
      background: var(--btn-bg);
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover {
      background: var(--btn-hover);
      transform: translateY(-2px);
    }

    .question-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
      padding: 1rem;
    }

    .question-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem;
      background: #f8f9fa;
      border-radius: 8px;
      transition: transform 0.2s;
    }

    .question-item:hover {
      transform: translateY(-3px);
    }

    .number {
      font-size: 1.3rem;
      color: var(--primary-color);
      min-width: 30px;
      text-align: center;
    }

    .operator {
      color: var(--accent-color);
      font-weight: 700;
      font-size: 1.4rem;
    }

    .answer-input {
      width: 70px;
      height: 40px;
      border: 2px solid var(--input-border);
      border-radius: 6px;
      text-align: center;
      font-size: 1.2rem;
      transition: all 0.2s;
    }

    .answer-input:focus {
      border-color: var(--btn-bg);
      box-shadow: 0 0 8px rgba(52, 152, 219, 0.3);
      outline: none;
    }

    .correct {
      background: var(--correct-bg) !important;
      color: white !important;
      border-color: transparent !important;
    }

    .wrong {
      background: var(--wrong-bg) !important;
      color: white !important;
      border-color: transparent !important;
    }
    /* 新增焦点样式 */
    .answer-input:focus {
      transform: scale(1.05);
      box-shadow: 0 0 10px rgba(52, 152, 219, 0.5);
    }

    /* 当前焦点标识 */
    .current-focus {
      border-color: #e74c3c !important;
      background: #fff9f9;
    }

    @media (max-width: 992px) {
      .question-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 576px) {
      .container {
        padding: 1rem;
      }

      .question-grid {
        grid-template-columns: 1fr;
      }

      .question-item {
        justify-content: center;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
    <script>
// 在原有代码基础上新增以下功能

let inputsArray = []; // 存储所有输入框的数组
let currentIndex = 0; // 当前焦点索引

// 初始化输入框数组
function initInputsArray() {
  inputsArray = Array.from(document.querySelectorAll('.answer-input'));
  inputsArray.forEach((input, index) => {
    input.dataset.index = index; // 添加索引标记
  });
}

// 键盘导航功能
function handleKeyNavigation(e) {
  const key = e.key;
  const activeElement = document.activeElement;

  // 只在输入框聚焦时响应
  if (!activeElement.classList.contains('answer-input')) return;

  currentIndex = parseInt(activeElement.dataset.index);

  switch(key) {
    case 'ArrowRight':
    case 'ArrowDown':
    case 'Enter':
      e.preventDefault();
      navigate(1);
      break;
    case 'ArrowLeft':
    case 'ArrowUp':
      e.preventDefault();
      navigate(-1);
      break;
  }
}

// 导航逻辑
function navigate(direction) {
  currentIndex += direction;

  // 边界处理
  if (currentIndex >= inputsArray.length) currentIndex = 0;
  if (currentIndex < 0) currentIndex = inputsArray.length - 1;

  inputsArray[currentIndex].focus();
}

// 在生成新题时更新输入框数组
function generateQuestions() {
  // ...原有生成逻辑...
  initInputsArray(); // 新增初始化数组
}

// 添加事件监听
document.addEventListener('keydown', handleKeyNavigation);

// 初始化时获取输入框
window.addEventListener('DOMContentLoaded', () => {
  initInputsArray();
  if (inputsArray.length > 0) inputsArray[0].focus();
});

// 修改原有newBtn点击事件
newBtn.addEventListener('click', () => {
  // ...原有逻辑...
  setTimeout(() => inputsArray[0]?.focus(), 0); // 生成后自动聚焦第一个
});
</script>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="title">速算训练营</h1>
      <div class="timer">
        <span id="minutes">00</span>:<span id="seconds">00</span>
      </div>
    </header>

    <div class="controls">
      <button class="btn" id="checkBtn">提交答案</button>
      <button class="btn" id="newBtn">新题生成</button>
    </div>

    <div class="question-grid" id="grid"></div>
  </div>

  <script>
    const grid = document.getElementById('grid');
    const checkBtn = document.getElementById('checkBtn');
    const newBtn = document.getElementById('newBtn');
    const minutes = document.getElementById('minutes');
    const seconds = document.getElementById('seconds');

    let timer = null;
    let time = 0;

    // 在input事件中添加自动跳转
    document.querySelectorAll('.answer-input').forEach(input => {
      input.addEventListener('input', (e) => {
        if (e.target.value.length >= 3) { // 输入满3位自动跳转
          navigate(1);
        }
      });
    });

    // 生成题目
    function generateQuestions() {
      grid.innerHTML = '';
      for(let i = 0; i < 5; i++) { // 5行
        for(let j = 0; j < 4; j++) { // 每行4题
          const question = document.createElement('div');
          question.className = 'question-item';

          const num1 = Math.floor(Math.random() * 20) + 1;
          const num2 = Math.floor(Math.random() * 20) + 1;
          const operator = Math.random() < 0.5 ? '+' : '-';

          question.innerHTML = `
            <span class="number">${num1}</span>
            <span class="operator">${operator}</span>
            <span class="number">${num2}</span>
            <span class="operator">=</span>
          `;

          const input = document.createElement('input');
          input.className = 'answer-input';
          input.type = 'number';
          input.placeholder = '?';

          question.appendChild(input);
          grid.appendChild(question);
        }
      }
    }

    // 更新计时器
    function updateTimer() {
      time++;
      minutes.textContent = String(Math.floor(time / 60)).padStart(2, '0');
      seconds.textContent = String(time % 60).padStart(2, '0');
    }

    // 检查答案
    checkBtn.addEventListener('click', () => {
      let correctCount = 0;
      const inputs = document.querySelectorAll('.answer-input');

      inputs.forEach(input => {
        const numbers = input.parentElement.querySelectorAll('.number');
        const operator = input.parentElement.querySelector('.operator').textContent;

        const a = parseInt(numbers[0].textContent);
        const b = parseInt(numbers[1].textContent);
        const correct = operator === '+' ? a + b : a - b;

        if(parseInt(input.value) === correct) {
          correctCount++;
          input.classList.add('correct');
          input.classList.remove('wrong');
        } else {
          input.classList.add('wrong');
          input.classList.remove('correct');
        }
      });

      clearInterval(timer);
      alert(`正确率：${correctCount}/${inputs.length}\n用时：${minutes.textContent}分${seconds.textContent}秒`);
    });

    // 生成新题
    newBtn.addEventListener('click', () => {
      generateQuestions();
      time = 0;
      clearInterval(timer);
      timer = setInterval(updateTimer, 1000);
      document.querySelectorAll('.answer-input').forEach(input => {
        input.value = '';
        input.classList.remove('correct', 'wrong');
      });
    });

    // 增强的navigate函数
    function navigate(direction) {
  // 移除旧焦点样式
  inputsArray[currentIndex]?.classList.remove('current-focus');

  currentIndex += direction;

  // 边界处理（循环模式）
  currentIndex = (currentIndex + inputsArray.length) % inputsArray.length;

  // 添加新焦点样式
  const target = inputsArray[currentIndex];
  target.classList.add('current-focus');
  target.focus();

  // 自动滚动到可见区域
  target.scrollIntoView({
    behavior: 'smooth',
    block: 'center',
    inline: 'center'
  });
}

    // 初始化
    generateQuestions();
    timer = setInterval(updateTimer, 1000);
  </script>
</body>
</html>
