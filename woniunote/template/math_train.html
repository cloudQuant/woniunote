<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>算术训练优化版</title>
    <link rel="stylesheet" href="/css/math_train.css">
    <script src="/js/math_train.js"></script>
</head>
<body>
  <!-- 新增导航栏 -->
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-left">
        <span class="navbar-title">速算训练营</span>
      </div>
      <div class="navbar-right">
        <input type="text" id="username" class="navbar-input" placeholder="用户名">
        <input type="password" id="password" class="navbar-input" placeholder="密码">
        <button class="navbar-btn" id="loginBtn">登录</button>
        <button class="navbar-btn" id="registerBtn">注册</button>
      </div>
    </div>
  </nav>

  <div class="container">
    <header class="header">
      <h1 class="title">速算训练营</h1>
      <div class="timer">
        <span id="minutes">00</span>:<span id="seconds">00</span>
      </div>
    </header>

    <div class="controls">
      <button class="btn" id="checkBtn">提交答案</button>
      <button class="btn" id="newBtn">新题生成</button>
    </div>

    <div class="question-grid" id="grid"></div>
  </div>
</body>
</html>
