<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日常算术训练</title>
    <style>
      :root {
        --bg-color: lightblue;
        --btn-bg: #3498db;
        --btn-bg-hover: #2980b9;
        --correct-bg: #1abc9c;
        --incorrect-bg: #e74c3c;
        --input-width: 50px;
        --input-height: 30px;
        --font-size: 1.2rem;
        --timer-font-size: 2rem;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-color);
        font-family: Arial, sans-serif;
      }

      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 30px;
      }

      .header {
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 20px;
        font-weight: bold;
        padding: 20px;
        background-color: var(--bg-color);
      }

      .timer {
        font-size: var(--timer-font-size);
        margin-left: 10px;
      }

      .content {
        width: 100%;
      }

      .content-1 {
        width: 100%;
        height: 50px;
        line-height: 50px;
        margin-bottom: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: var(--font-size);
        color: #000000; /* 数字字体颜色为黑色 */
      }

      .content-1 span {
        margin: 0 10px; /* 增加算术题左右间隔 */
      }

      .content-1 .operator {
        color: red; /* 算术符号颜色为红色 */
      }

      .content-1 input {
        width: var(--input-width);
        height: var(--input-height);
        margin-left: 10px;
        border-radius: 5px;
        border: none;
        text-align: center;
        font-size: var(--font-size);
      }

      .content-1 input:focus {
        outline: none;
        box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
      }

      .content-1 input.correct {
        background-color: var(--correct-bg);
        color: #ffffff;
      }

      .content-1 input.incorrect {
        background-color: var(--incorrect-bg);
        color: #ffffff;
      }

      .footer {
        width: 50%;
        margin-top: 30px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      form {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .footer input {
        width: 80px;
        height: 40px;
        margin-right: 10px;
        border-radius: 5px;
        border: none;
        font-size: var(--font-size);
        color: #ffffff;
        background-color: var(--btn-bg);
        cursor: pointer;
        transition: background-color 0.2s ease;
      }

      .footer input:hover {
        background-color: var(--btn-bg-hover);
      }

      #bt2 {
        margin-left: auto;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="footer">
        <form>
          <input type="button" id="bt1" value="判断" />
          <input type="button" id="bt2" value="生成计算" />
        </form>
      </div>
      <div class="header">
        <p>我的日常算术训练---每天5-10分钟<br>当前计算使用的时间&nbsp;&nbsp;</p>
        <span id="id_M">00</span><p>:</p><span id="id_S">00</span>
      </div>
      <div class="content" id="content"></div>
    </div>

    <script>
      // 获取DOM元素
      const oBt1 = document.getElementById("bt1");
      const oBt2 = document.getElementById("bt2");
      const contentDiv = document.getElementById("content");
      const id_S = document.getElementById("id_S");
      const id_M = document.getElementById("id_M");

      let timer = null;
      let c = 0; // 计时器变量

      // 创建题目
      function createQuestions() {
        contentDiv.innerHTML = ""; // 清空现有内容
        for (let i = 0; i < 10; i++) {
          const rowDiv = document.createElement('div');
          rowDiv.classList.add('content-1');
          for (let j = 0; j < 5; j++) {
            const span = document.createElement('span');
            span.classList.add('sp');

            // 随机生成两个数字和一个运算符
            const num1 = Math.floor(Math.random() * 10) + 1; // 随机数字1 (1-10)
            const num2 = Math.floor(Math.random() * 10) + 1; // 随机数字2 (1-10)
            const operator = Math.random() < 0.5 ? '+' : '-'; // 随机选择加号或减号

            // 设置题目
            span.innerHTML = `${num1} <span class="operator">${operator}</span> ${num2} = `;

            const input = document.createElement('input');
            input.classList.add('answer');
            input.type = 'text';
            rowDiv.appendChild(span);
            rowDiv.appendChild(input);
          }
          contentDiv.appendChild(rowDiv);
        }
      }

      // 更新计时器
      function updateTimer() {
        c++;
        id_S.innerText = showNum(c % 60);
        id_M.innerText = showNum(parseInt(c / 60) % 60);
      }

      // 处理时间格式
      function showNum(num) {
        return num < 10 ? '0' + num : num;
      }

      // 判断答案
      oBt1.onclick = function() {
        let count = 0;
        const inputs = document.querySelectorAll('.answer');
        const questions = document.querySelectorAll('.sp');

        inputs.forEach((input, index) => {
          const [num1, operator, num2] = questions[index].innerText.split(' ');
          const correctAnswer = operator === '+' ? (+num1 + +num2) : (+num1 - +num2);
          if (Number(input.value) === correctAnswer) {
            count++;
          } else {
            input.classList.add('incorrect');
          }
        });

        // 停止计时器
        clearInterval(timer);
        alert(`恭喜你答对了 ${count} 题! 共用时 ${id_M.innerText} 分 ${id_S.innerText} 秒！`);
      };

      // 开始计时并生成新题目
      oBt2.onclick = function() {
        // 清除输入框样式
        document.querySelectorAll('.answer').forEach(input => input.classList.remove('incorrect'));
        createQuestions();

        // 重置计时
        c = 0;
        timer = setInterval(updateTimer, 1000);
      };

      // 初始化
      createQuestions();
    </script>
  </body>
</html>
