<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日算术训练</title>
    <style>
      :root {
        --bg-color: #f0f7ff;
        --btn-bg: #4a90e2;
        --btn-bg-hover: #357abd;
        --correct-bg: #7ed321;
        --incorrect-bg: #ff4757;
        --input-width: 65px;
        --input-height: 38px;
        --font-size: 1.3rem;
        --timer-font-size: 2.2rem;
        --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      body {
        margin: 0;
        padding: 20px;
        background: linear-gradient(135deg, #f0f7ff 0%, #e6f0ff 100%);
        font-family: 'Segoe UI', system-ui, sans-serif;
        min-height: 100vh;
      }

      .container {
        max-width: 1200px;
        margin: 20px auto;
        padding: 30px;
        background: white;
        border-radius: 15px;
        box-shadow: var(--shadow);
      }

      .header {
        text-align: center;
        margin-bottom: 30px;
      }

      .title {
        font-size: 2rem;
        color: #2c3e50;
        margin-bottom: 10px;
        font-weight: 600;
      }

      .timer-container {
        display: flex;
        justify-content: center;
        align-items: baseline;
        gap: 5px;
        font-size: var(--timer-font-size);
        color: #3498db;
        margin: 20px 0;
      }

      .controls {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 30px;
      }

      .btn {
        padding: 12px 25px;
        border: none;
        border-radius: 8px;
        background-color: var(--btn-bg);
        color: white;
        font-size: 1.1rem;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: var(--shadow);
      }

      .btn:hover {
        background-color: var(--btn-bg-hover);
        transform: translateY(-2px);
      }

      .questions-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 25px;
        padding: 20px;
      }

      .question-row {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 12px;
        background: #f8f9ff;
        border-radius: 8px;
        transition: transform 0.2s;
      }

      .question-row:hover {
        transform: translateY(-3px);
      }

      .question-item {
        display: flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
      }

      .number {
        color: #2c3e50;
        font-weight: 500;
      }

      .operator {
        color: #ff4757;
        font-weight: bold;
      }

      .answer-input {
        width: var(--input-width);
        height: var(--input-height);
        border: 2px solid #dfe6ec;
        border-radius: 6px;
        text-align: center;
        font-size: var(--font-size);
        transition: all 0.2s;
      }

      .answer-input:focus {
        border-color: #4a90e2;
        box-shadow: 0 0 8px rgba(74, 144, 226, 0.3);
        outline: none;
      }

      .answer-input.correct {
        background-color: var(--correct-bg);
        color: white;
        border-color: transparent;
      }

      .answer-input.incorrect {
        background-color: var(--incorrect-bg);
        color: white;
        border-color: transparent;
      }

      @media (max-width: 768px) {
        .container {
          padding: 20px;
          margin: 10px;
        }

        .questions-grid {
          grid-template-columns: 1fr;
        }

        .question-row {
          flex-wrap: wrap;
          justify-content: center;
          gap: 10px;
        }

        .btn {
          width: 100%;
          padding: 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1 class="title">每日算术训练</h1>
        <div class="timer-container">
          <span id="id_M">00</span>
          <span>:</span>
          <span id="id_S">00</span>
        </div>
      </header>

      <div class="controls">
        <button class="btn" id="bt1">检查答案</button>
        <button class="btn" id="bt2">新题生成</button>
      </div>

      <div class="questions-grid" id="content"></div>
    </div>

    <script>
      // 获取DOM元素
      const oBt1 = document.getElementById("bt1");
      const oBt2 = document.getElementById("bt2");
      const contentDiv = document.getElementById("content");
      const id_S = document.getElementById("id_S");
      const id_M = document.getElementById("id_M");

      let timer = null;
      let c = 0;

      // 创建题目
      function createQuestions() {
        contentDiv.innerHTML = "";
        for (let i = 0; i < 8; i++) { // 减少行数提高可读性
          const rowDiv = document.createElement('div');
          rowDiv.className = 'question-row';

          for (let j = 0; j < 3; j++) { // 每行3题更合理
            const questionDiv = document.createElement('div');
            questionDiv.className = 'question-item';

            const num1 = Math.floor(Math.random() * 15) + 1; // 扩大数字范围
            const num2 = Math.floor(Math.random() * 15) + 1;
            const operator = Math.random() < 0.5 ? '+' : '-';

            questionDiv.innerHTML = `
              <span class="number">${num1}</span>
              <span class="operator">${operator}</span>
              <span class="number">${num2}</span>
              <span class="operator">=</span>
            `;

            const input = document.createElement('input');
            input.className = 'answer-input';
            input.type = 'number'; // 改为数字输入类型
            input.placeholder = '?';

            questionDiv.appendChild(input);
            rowDiv.appendChild(questionDiv);
          }
          contentDiv.appendChild(rowDiv);
        }
      }

      // 计时功能
      function updateTimer() {
        c++;
        id_S.textContent = c % 60 < 10 ? `0${c % 60}` : c % 60;
        id_M.textContent = Math.floor(c / 60) < 10 ? `0${Math.floor(c / 60)}` : Math.floor(c / 60);
      }

      // 答案检查
      oBt1.addEventListener('click', () => {
        let correctCount = 0;
        const inputs = document.querySelectorAll('.answer-input');

        inputs.forEach(input => {
          const [num1, operator, num2] = input.parentElement.querySelectorAll('.number, .operator');
          const a = parseInt(num1.textContent);
          const b = parseInt(num2.textContent);
          const correct = operator.textContent === '+' ? a + b : a - b;

          if (parseInt(input.value) === correct) {
            correctCount++;
            input.classList.add('correct');
            input.classList.remove('incorrect');
          } else {
            input.classList.add('incorrect');
            input.classList.remove('correct');
          }
        });

        clearInterval(timer);
        const timeUsed = `${id_M.textContent}分${id_S.textContent}秒`;
        alert(`正确题数: ${correctCount}/${inputs.length}\n用时: ${timeUsed}`);
      });

      // 新题生成
      oBt2.addEventListener('click', () => {
        document.querySelectorAll('.answer-input').forEach(input => {
          input.classList.remove('correct', 'incorrect');
          input.value = '';
        });
        createQuestions();
        c = 0;
        timer = setInterval(updateTimer, 1000);
      });

      // 初始化
      createQuestions();
    </script>
  </body>
</html>
