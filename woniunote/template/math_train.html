<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Training</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Navbar -->
  <nav>
    <ul>
      <li><button id="showLoginModalBtn">登录</button></li>
      <li><button id="showRegisterModalBtn">注册</button></li>
      <li><button id="userCenterBtn" class="logged-in" style="display:none;">用户中心</button></li>
      <li><button id="logoutBtn" class="logged-in" style="display:none;">退出登录</button></li>
      <li class="logged-out"><button id="showLoginModalBtn">登录</button></li>
      <li class="logged-out"><button id="showRegisterModalBtn">注册</button></li>
      <li><span id="navbarUsername"></span></li>
    </ul>
  </nav>

  <!-- Modal for login -->
  <div id="loginModal" class="modal">
    <div class="modal-content">
      <h2>登录</h2>
      <input type="text" id="loginUsername" placeholder="用户名">
      <input type="password" id="loginPassword" placeholder="密码">
      <button id="loginBtn">登录</button>
    </div>
  </div>

  <!-- Modal for register -->
  <div id="registerModal" class="modal">
    <div class="modal-content">
      <h2>注册</h2>
      <input type="text" id="registerUsername" placeholder="用户名">
      <input type="password" id="registerPassword" placeholder="密码">
      <input type="email" id="registerEmail" placeholder="邮箱">
      <button id="registerBtn">注册</button>
    </div>
  </div>

  <!-- Main content -->
  <div id="mainContent">
    <div id="grid"></div>
    <div>
      <button id="newBtn">生成新题</button>
      <button id="startBtn">开始做题</button>
      <button id="checkBtn">提交答案</button>
    </div>
    <div>计时: <span id="minutes">00</span>:<span id="seconds">00</span></div>
  </div>

  <script src="math_train.js"></script>
</body>
</html>
