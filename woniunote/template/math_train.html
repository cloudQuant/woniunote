<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>算术训练优化版</title>
  <link rel="stylesheet" href="/css/math_train.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="navbar-container">
      <!-- 左侧：速算训练营、新题生成、提交答案 -->
      <div class="navbar-left">
        <span class="navbar-title">速算训练营</span>
        <button class="navbar-btn" id="newBtn">新题生成</button>
        <button class="navbar-btn" id="checkBtn">提交答案</button>
      </div>

      <!-- 中间：时间显示 -->
      <div class="navbar-center">
        <div class="timer">
          <span id="minutes">00</span>:<span id="seconds">00</span>
        </div>
      </div>

      <!-- 右侧：登录、注册、登出、用户中心 -->
      <div class="navbar-right">
        <span class="navbar-username" id="navbarUsername" style="display: none;"></span>
        <button class="navbar-btn" id="showLoginModalBtn">登录</button>
        <button class="navbar-btn" id="showRegisterModalBtn">注册</button>
        <button class="navbar-btn" id="logoutBtn" style="display: none;">退出</button>
        <button class="navbar-btn" id="userCenterBtn" style="display: none;" onclick="window.location.href='/math_train_user'">用户中心</button>
      </div>
    </div>
  </nav>

  <!-- 主内容 -->
  <div class="container">
    <div class="question-grid" id="grid"></div>
  </div>

  <!-- 登录对话框 -->
  <div id="loginModal" class="modal">
    <div class="modal-content">
      <h2>登录</h2>
      <input type="text" id="loginUsername" placeholder="用户名">
      <input type="password" id="loginPassword" placeholder="密码">
      <button id="loginBtn">登录</button>
      <p class="switch-mode" id="switchToRegister">没有账号？立即注册</p>
    </div>
  </div>

  <!-- 注册对话框 -->
  <div id="registerModal" class="modal">
    <div class="modal-content">
      <h2>注册</h2>
      <input type="text" id="registerUsername" placeholder="用户名">
      <input type="password" id="registerPassword" placeholder="密码">
      <button id="registerBtn">注册</button>
      <p class="switch-mode" id="switchToLogin">已有账号？立即登录</p>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="/js/math_train.js"></script>
</body>
</html>
