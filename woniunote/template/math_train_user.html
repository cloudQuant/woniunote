<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户中心 - 速算训练营</title>
  <link rel="stylesheet" href="/css/math_train.css">
</head>
<body>
  <!-- 导航栏 -->
  <div class="navbar-right">
    <span class="navbar-username" id="navbarUsername"></span>
    <button class="navbar-btn" onclick="window.location.href='/math_train'">开始训练</button>
    <button class="navbar-btn" id="logoutBtn">退出</button>
  </div>

  <!-- 数据展示区 -->
  <div class="container">
    <h2>训练记录</h2>
    <div class="stats-overview">
      <div class="stat-box">
        <h3>总练习次数</h3>
        <p id="totalSessions">0</p>
      </div>
      <div class="stat-box">
        <h3>平均正确率</h3>
        <p id="avgAccuracy">0%</p>
      </div>
      <div class="stat-box">
        <h3>最佳用时</h3>
        <p id="bestTime">00:00</p>
      </div>
    </div>

    <div class="history-table">
      <table>
        <thead>
          <tr>
            <th>日期</th>
            <th>难度</th>
            <th>正确数</th>
            <th>总题数</th>
            <th>用时</th>
          </tr>
        </thead>
        <tbody id="historyBody">
          <!-- 动态填充数据 -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- JavaScript -->
  <script>
    // 获取训练历史数据
    async function loadTrainingHistory() {
      try {
        const response = await fetch('/math_train_user_data');
        const data = await response.json();

        // 更新统计数据
        document.getElementById('totalSessions').textContent = data.total_sessions;
        document.getElementById('avgAccuracy').textContent = data.avg_accuracy + '%';
        document.getElementById('bestTime').textContent = data.best_time;

        // 填充表格
        const tbody = document.getElementById('historyBody');
        tbody.innerHTML = data.history.map(record => `
          <tr>
            <td>${new Date(record.created_at).toLocaleDateString()}</td>
            <td>${record.math_level}</td>
            <td>${record.correct_count}</td>
            <td>${record.total_questions}</td>
            <td>${Math.floor(record.time_spent/60)}:${record.time_spent%60}</td>
          </tr>
        `).join('');
      } catch (error) {
        console.error('加载数据失败:', error);
      }
    }

    // 初始化加载数据
    window.onload = loadTrainingHistory;
  </script>
</body>
</html>
