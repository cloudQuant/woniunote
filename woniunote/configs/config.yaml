# yaml文件，文件名为config.yaml
# 根据需要，修改配置自己的用户名和密码、文章类型
# 用于生成admin账户的用户名，昵称和密码
admin:
  username: woniunote_admin
  nickname: admin
  password: woniunote_admin_password1!

# 用于生成编辑账户的用户名，昵称和密码
editor:
  username: woniunote_editor
  nickname: editor
  password: woniunote_editor_password1!

# 用于生成一个普通账户的用户名，昵称和密码
user:
  username: woniunote_user
  nickname: user
  password: woniunote_user_password1!

database:
  SQLALCHEMY_DATABASE_URI: mysql://woniunote_user:Woniunote_password1!@127.0.0.1:3306/woniunote?charset=utf8&autocommit=true

